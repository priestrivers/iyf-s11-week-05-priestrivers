<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily DOM Challenges</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Daily DOM Challenges</h1>

<section>

    <h2> Color Changer</h2>

    <h3>Click the button to change heading colors.</h3>

    <button id="colorBtn">
        Change Heading Colors
    </button>

</section>

<hr>


<section>

    <h2> Dynamic Element Creator</h2>

    <button id="addParagraph">
        Add Paragraph
    </button>

    <div id="paragraphs"></div>

</section>

<hr>

<section>

    <h2> Image Remover</h2>

    <img
        src="https://picsum.photos/200?random=1"
        alt="Random Image">

    <img
        src="https://picsum.photos/200?random=2"
        alt="Random Image">

    <br><br>

    <button id="toggleImages">

        Hide Images

    </button>

</section>

<hr>


<section>

    <h2> Content Copier</h2>

    <div id="source">

        <h3>Source Content</h3>

        <p>

            This text will be copied into the target box.

        </p>

    </div>

    <button id="copyBtn">

        Copy Content

    </button>

    <div id="target">

        <h3>Target Content</h3>

    </div>

</section>

<hr>


<section>

    <h2> Dark Mode Toggle</h2>

    <button id="darkMode">

        Toggle Dark Mode

    </button>

</section>

<script src="app.js"></script>

</body>
</html>
